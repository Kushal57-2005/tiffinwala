<!DOCTYPE html>
<html>
<head>
  <title>Test Payment</title>
</head>
<body>
  <button id="payBtn">Pay ₹9999</button>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    document.getElementById("payBtn").onclick = function () {
      const options = {
        key: "rzp_test_T0aN3idQ0DHls1",       // paste your keyId
        amount: 999900,                  // paste amount from response
        currency: "INR",
        order_id: "order_T0bNq8Y9YzPj60",      // paste orderId from response
        name: "TiffinWala",
        description: "Vendor Registration Fee",
        handler: function (response) {
          console.log("Payment Success:", response);
          alert(
            "order_id: " + response.razorpay_order_id + "\n" +
            "payment_id: " + response.razorpay_payment_id + "\n" +
            "signature: " + response.razorpay_signature
          );
        },
        theme: { color: "#06b6d4" }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    };
  </script>
</body>
</html>
