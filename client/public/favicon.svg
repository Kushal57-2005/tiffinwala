<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <!-- Background Circle for excellent visibility in dark/light browser tabs -->
    <circle cx="256" cy="256" r="236" fill="#FBF4EC" stroke="#5C7A52" stroke-width="16" />
    
    <!-- Organic Leaves / Steam rising from the tiffin -->
    <g transform="translate(256, 125) scale(0.95)">
        <!-- Left leaf sprout -->
        <path d="M-15,-20 C-35,-45 -65,-35 -55,-10 C-45,-10 -25,0 -15,-20 Z" fill="#7E9C73" />
        <!-- Right leaf sprout (Main Accent) -->
        <path d="M15,-25 C30,-55 65,-55 55,-15 C45,-15 25,-5 15,-25 Z" fill="#5C7A52" />
        <!-- Middle soft steam curl -->
        <path d="M-5,-30 Q-15,-60 10,-85" stroke="#5C7A52" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6" />
    </g>

    <!-- Metal Handle & Lock Frame -->
    <!-- Main Arch Handle -->
    <path d="M166,220 V145 C166,95 346,95 346,145 V220" stroke="#5C7A52" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Small Top Grip Loop -->
    <path d="M226,95 C226,70 286,70 286,95" stroke="#5C7A52" stroke-width="12" stroke-linecap="round" fill="none" />
    
    <!-- Central Alignment Latch Lock -->
    <rect x="246" y="160" width="20" height="250" rx="10" fill="#7E9C73" />

    <!-- Three Tier Stacked Tiffin Containers -->
    <!-- Top Container Tier -->
    <rect x="156" y="210" width="200" height="60" rx="16" fill="#5C7A52" />
    <rect x="176" y="234" width="160" height="12" rx="6" fill="#7E9C73" opacity="0.4" />
    
    <!-- Middle Container Tier -->
    <rect x="156" y="285" width="200" height="60" rx="16" fill="#5C7A52" />
    <rect x="176" y="309" width="160" height="12" rx="6" fill="#7E9C73" opacity="0.4" />
    
    <!-- Bottom Container Tier -->
    <rect x="156" y="360" width="200" height="60" rx="16" fill="#5C7A52" />
    <rect x="176" y="384" width="160" height="12" rx="6" fill="#7E9C73" opacity="0.4" />

    <!-- Side Latch Bars -->
    <!-- Left side rod -->
    <rect x="146" y="220" width="12" height="190" rx="6" fill="#7E9C73" />
    <!-- Right side rod -->
    <rect x="354" y="220" width="12" height="190" rx="6" fill="#7E9C73" />
</svg>